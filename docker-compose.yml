name: cytroksys

services:
  app:
    build:
      context: .
      target: dev
    container_name: cytroksys-dev
    command: npm run dev -- --host 0.0.0.0 --port 5173
    environment:
      CHOKIDAR_USEPOLLING: "true"
      VITE_API_PROXY_TARGET: ${VITE_API_PROXY_TARGET:-http://api:8787}
      VITE_EMAILJS_SERVICE_ID: ${VITE_EMAILJS_SERVICE_ID:-}
      VITE_EMAILJS_TEMPLATE_ID: ${VITE_EMAILJS_TEMPLATE_ID:-}
      VITE_EMAILJS_PUBLIC_KEY: ${VITE_EMAILJS_PUBLIC_KEY:-}
      VITE_FIREBASE_API_KEY: ${VITE_FIREBASE_API_KEY:-}
      VITE_FIREBASE_AUTH_DOMAIN: ${VITE_FIREBASE_AUTH_DOMAIN:-}
      VITE_FIREBASE_PROJECT_ID: ${VITE_FIREBASE_PROJECT_ID:-}
      VITE_FIREBASE_STORAGE_BUCKET: ${VITE_FIREBASE_STORAGE_BUCKET:-}
      VITE_FIREBASE_MESSAGING_SENDER_ID: ${VITE_FIREBASE_MESSAGING_SENDER_ID:-}
      VITE_FIREBASE_APP_ID: ${VITE_FIREBASE_APP_ID:-}
    ports:
      - "5173:5173"
    volumes:
      - .:/app
      - node_modules:/app/node_modules
    depends_on:
      - api
    restart: unless-stopped
    profiles: ["dev"]

  api:
    build:
      context: .
      target: api
    container_name: cytroksys-api
    environment:
      GOOGLE_API_KEY: ${GOOGLE_API_KEY:-}
      GOOGLE_MODEL: ${GOOGLE_MODEL:-gemini-2.0-flash}
      SUPPORT_EMAIL: ${SUPPORT_EMAIL:-support@cytroksys.in}
      GRAPH_TENANT_ID: ${GRAPH_TENANT_ID:-}
      GRAPH_CLIENT_ID: ${GRAPH_CLIENT_ID:-}
      GRAPH_CLIENT_SECRET: ${GRAPH_CLIENT_SECRET:-}
      GRAPH_SENDER_UPN: ${GRAPH_SENDER_UPN:-support@cytroksys.in}
      SMTP_HOST: ${SMTP_HOST:-smtp.office365.com}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      SMTP_FROM: ${SMTP_FROM:-}
      CUSTOMER_OTP_TTL_MS: ${CUSTOMER_OTP_TTL_MS:-600000}
      CUSTOMER_OTP_MAX_ATTEMPTS: ${CUSTOMER_OTP_MAX_ATTEMPTS:-5}
      CUSTOMER_SESSION_TTL_MS: ${CUSTOMER_SESSION_TTL_MS:-86400000}
      PORT: 8787
    restart: unless-stopped
    profiles: ["dev", "prod"]

  web:
    build:
      context: .
      target: prod
      args:
        VITE_EMAILJS_SERVICE_ID: ${VITE_EMAILJS_SERVICE_ID:-}
        VITE_EMAILJS_TEMPLATE_ID: ${VITE_EMAILJS_TEMPLATE_ID:-}
        VITE_EMAILJS_PUBLIC_KEY: ${VITE_EMAILJS_PUBLIC_KEY:-}
        VITE_FIREBASE_API_KEY: ${VITE_FIREBASE_API_KEY:-}
        VITE_FIREBASE_AUTH_DOMAIN: ${VITE_FIREBASE_AUTH_DOMAIN:-}
        VITE_FIREBASE_PROJECT_ID: ${VITE_FIREBASE_PROJECT_ID:-}
        VITE_FIREBASE_STORAGE_BUCKET: ${VITE_FIREBASE_STORAGE_BUCKET:-}
        VITE_FIREBASE_MESSAGING_SENDER_ID: ${VITE_FIREBASE_MESSAGING_SENDER_ID:-}
        VITE_FIREBASE_APP_ID: ${VITE_FIREBASE_APP_ID:-}
    container_name: cytroksys-web
    depends_on:
      - api
    ports:
      - "9488:80"
    restart: unless-stopped
    profiles: ["prod"]

volumes:
  node_modules:
